name: Bug report
description: Report a reproducible game, multiplayer, or UI problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Lobby and room sharing
        - Basic tic-tac-toe
        - 3D tic-tac-toe
        - Ultra-fast mode
        - Multiplayer synchronization
        - Layout and styling
        - Build and tooling
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and device
      placeholder: Chrome 136, macOS 15
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, video, or console output
